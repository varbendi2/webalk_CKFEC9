<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/layout-main}">
<head>
    <title>Bejelentkezési oldal</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div th:if="${param.error}">
                    <div class="alert alert-danger">Érvénytelen e-mail vagy jelszó</div>
                </div>
                <div th:if="${param.logout}">
                    <div class="alert alert-success">Sikeres kijelentkezés</div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2 class="text-center">Bejelentkezés</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/login}">
                            <div class="form-group mb-3">
                                <label class="form-label" for="username">E-mail:</label>
                                <input class="form-control" id="username" name="username" type="email" placeholder="E-mail" autofocus>
                                <small class="form-text text-muted">pl. pelda@gmail.com</small>
                            </div>
                            <div class="form-group mb-3">
                                <label class="form-label" for="password">Jelszó:</label>
                                <input class="form-control" id="password" name="password" type="password"
                                       placeholder="Adja meg a jelszavát">
                            </div>
                            <div class="form-group mb-3">
                                <button type="submit" class="btn btn-primary">Bejelentkezés</button>
                                <span>Még nincs fiókja? <a th:href="@{/register/customer}">Regisztráljon itt</a></span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
